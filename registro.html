<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="connect-src *; default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net https://fonts.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com https://cdn.jsdelivr.net; img-src 'self' data: https:; font-src 'self' data: https://fonts.gstatic.com https://cdnjs.cloudflare.com; frame-src 'self' https://wa.me; child-src 'self' https://wa.me;">
  <title>Registro - Mercado Central</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  .password-container {
    position: relative;
    width: 100%;
  }
  .password-container input {
    width: 100%;
    box-sizing: border-box;
    padding-right: 50px;
    margin: 0;
  }
  .password-container .toggle-password {
    position: absolute;
    right: 18px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    cursor: pointer;
    color: #666;
    font-size: 1.1rem;
    padding: 5px;
    margin: 0;
  }
  .password-container .toggle-password:hover {
    color: #00bfae;
  }
</style>
<script>
function togglePassword(inputId) {
  const input = document.getElementById(inputId);
  const icon = document.getElementById(inputId + '-icon');
  if (input.type === 'password') {
    input.type = 'text';
    icon.classList.remove('fa-eye');
    icon.classList.add('fa-eye-slash');
  } else {
    input.type = 'password';
    icon.classList.remove('fa-eye-slash');
    icon.classList.add('fa-eye');
  }
}
</script>
</head>
<body>

  <!-- NAVBAR MODERNO -->
  <div id="navbar-container"></div>

  <div class="login-center-container">
    <main class="auth-main">
      <div class="form-box">
        <h2>Crear una Cuenta</h2>
        <form id="register-form">
          <input type="email" id="email-register" name="email" placeholder="Correo electrónico" autocomplete="email" required>
          <div class="password-container">
            <input type="password" id="password-register" name="password" placeholder="Contraseña" autocomplete="new-password" required>
          </div>
          
          
          
          <button type="submit">Registrarse</button>
        </form>
        <p>¿Ya tienes una cuenta? <a href="login.html">Inicia sesión aquí</a>.</p>
      </div>
    </main>
  </div>

  <!-- FOOTER PREMIUM -->
  <div id="footer-container"></div>

  <!-- Carga la librería de Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <!-- Scripts como módulos -->
  <script type="module" src="supabase-client.js"></script>
  <script type="module" src="main.js"></script>
<script type="module" src="navbar-logic.js"></script>
<script src="load-components.js" defer></script>

</body>
</html>
