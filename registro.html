<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="connect-src *; default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net https://fonts.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com https://cdn.jsdelivr.net; img-src 'self' data: https:; font-src 'self' data: https://fonts.gstatic.com https://cdnjs.cloudflare.com; frame-src 'self' https://wa.me; child-src 'self' https://wa.me;">
  <title>Registro - Mercado Central</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  .password-container {
    position: relative;
    width: 100%;
  }
  .password-container input {
    width: 100%;
    box-sizing: border-box;
    padding-right: 50px;
    margin: 0;
  }
  .password-container .toggle-password {
    position: absolute;
    right: 18px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    cursor: pointer;
    color: #666;
    font-size: 1.1rem;
    padding: 5px;
    margin: 0;
  }
  .password-container .toggle-password:hover {
    color: #00bfae;
  }
</style>
<script>
function togglePassword(inputId) {
  const input = document.getElementById(inputId);
  const icon = document.getElementById(inputId + '-icon');
  if (input.type === 'password') {
    input.type = 'text';
    icon.classList.remove('fa-eye');
    icon.classList.add('fa-eye-slash');
  } else {
    input.type = 'password';
    icon.classList.remove('fa-eye-slash');
    icon.classList.add('fa-eye');
  }
}
</script>
</head>
<body>

  <!-- NAVBAR MODERNO -->
  <div id="navbar-container"></div>
  <style>
    body {
      background: #e0f7fa;
      font-family: 'Poppins', sans-serif;
    }
    .navbar-moderno {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 28px 14px 28px;
      background: #00bfae;
      box-shadow: 0 2px 12px rgba(0,0,0,0.07);
      position: relative;
      z-index: 10;
    }
    .logo-container a {
      color: #fff !important;
    }
    .logo-img {
      height: 36px;
      width: auto;
      margin-right: 8px;
      border-radius: 6px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      background: #fff;
    }
    .logo-text {
      font-family: 'Poppins', sans-serif;
      font-size: 1.2rem;
      font-weight: 700;
      letter-spacing: 1px;
      color: #fff;
    }
    .menu-nav {
      display: flex;
      gap: 18px;
      list-style: none;
      margin: 0;
      padding: 0;
      font-family: 'Poppins', sans-serif;
      font-size: 0.95rem;
      font-weight: 500;
      color: #fff;
    }
    .menu-nav li {
      cursor: pointer;
      transition: color 0.2s;
    }
    .menu-nav li:hover {
      color: #ffe082;
      text-decoration: underline;
    }
    .buttons-nav {
      display: flex;
      gap: 8px;
    }
    .buttons-nav button {
      background: #fff;
      color: #00bfae;
      font-family: 'Poppins', sans-serif;
      font-weight: 600;
      border: none;
      border-radius: 5px;
      padding: 7px 16px;
      font-size: 0.95rem;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      transition: background 0.2s, color 0.2s;
    }
    .buttons-nav button:hover {
      background: #00bfae;
      color: #fff;
    }
    .form-box {
      border: 2px solid #00bfae;
      border-radius: 10px;
      padding: 30px;
      max-width: 400px;
      margin: 40px auto;
      background: #e0f7fa;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
    }
    .form-box h2 {
      font-family:'Poppins',sans-serif;
      font-size:1.5rem;
      font-weight:700;
      color:#00bfae;
      letter-spacing:1px;
    }
    .form-box button {
      background: #00bfae !important;
      color: #fff !important;
      font-family: 'Poppins', sans-serif;
      font-weight: 600;
      border: none;
      border-radius: 5px;
      padding: 10px 20px;
      font-size: 0.95rem;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,0.08);
      transition: background 0.2s, color 0.2s;
    }
    .form-box button:hover {
      background: #009688 !important;
      color: #fff !important;
    }
    .footer {
      background: #0a2342;
      color: #fff;
      padding: 40px 0 0 0;
    }
    .footer-bottom {
      background: #0a2342;
      color: #fff;
      text-align: center;
      padding: 10px 0;
      font-size: 0.95em;
      border-top: none;
    }
    .footer-col h4 {
      color: #00bfae;
    }
    .icon-social {
      vertical-align: middle;
      margin-right: 8px;
      height: 24px;
    }
    .footer-col ul li a {
      color: #fff;
      text-decoration: none;
      transition: color 0.2s;
    }
    .footer-col ul li a:hover {
      color: #ffe082;
    }
  </style>

  <div class="form-box">
    <h2>Crear una Cuenta</h2>
    <form id="register-form">
      <input type="email" id="email-register" name="email" placeholder="Correo electrónico" autocomplete="email" required>
      <div class="password-container">
        <input type="password" id="password-register" name="password" placeholder="Contraseña" autocomplete="new-password" required>
      </div>
      
      <!-- Campo opcional para código de invitación -->
      <div class="invitation-container">
        <label for="codigo-invitacion" style="display: block; margin-bottom: 0.5rem; color: #0a2342; font-weight: 500;">
          ¿Tienes un código de invitación? (Opcional)
        </label>
        <input type="text" id="codigo-invitacion" name="codigo" placeholder="TOP-XXX-YYYY" 
               style="width: 100%; padding: 10px; border: 2px solid #00bfae; border-radius: 5px; font-family: 'Courier New', monospace; text-transform: uppercase;">
        <small style="display: block; margin-top: 0.5rem; color: #666;">
          Si tienes un código de cortesía para plan gratis, ingrésalo aquí
        </small>
      </div>
      
      <button type="submit">Registrarse</button>
    </form>
    <p>¿Ya tienes una cuenta? <a href="login.html">Inicia sesión aquí</a>.</p>
  </div>

  <!-- FOOTER PREMIUM -->
  <div id="footer-container"></div>

  <!-- Carga la librería de Supabase -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  
  <!-- Scripts como módulos -->
  <script type="module" src="supabase-client.js"></script>
  <script type="module" src="main.js"></script>
<script type="module" src="navbar-logic.js"></script>
<script src="load-components.js" defer></script>

</body>
</html>
