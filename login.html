<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="connect-src *; default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net https://fonts.googleapis.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com https://cdn.jsdelivr.net; img-src 'self' data: https:; font-src 'self' data: https://fonts.gstatic.com https://cdnjs.cloudflare.com; frame-src 'self' https://wa.me; child-src 'self' https://wa.me;">
  <title>Login - Mercado Central</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  .password-container {
    position: relative;
    width: 100%;
  }
  .password-container input {
    width: 100%;
    box-sizing: border-box;
    padding-right: 50px;
    margin: 0;
  }
  .password-container .toggle-password {
    position: absolute;
    right: 18px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    cursor: pointer;
    color: #666;
    font-size: 1.1rem;
    padding: 5px;
    margin: 0;
  }
  .password-container .toggle-password:hover {
    color: #00bfae;
  }
</style>
<script>
function togglePassword(inputId) {
  const input = document.getElementById(inputId);
  const icon = document.getElementById(inputId + '-icon');
  if (input.type === 'password') {
    input.type = 'text';
    icon.classList.remove('fa-eye');
    icon.classList.add('fa-eye-slash');
  } else {
    input.type = 'password';
    icon.classList.remove('fa-eye-slash');
    icon.classList.add('fa-eye');
  }
}
</script>
</head>
<body id="pagina-login">

  <!-- NAVBAR MODERNO -->
  <div id="navbar-container"></div>

  <div class="login-center-container">
    <main class="auth-main">
      <div class="form-box">
        <h2>Iniciar Sesión</h2>
        <form id="login-form">
          <input type="email" id="email" name="email" placeholder="Correo electrónico" autocomplete="email">
          <div class="password-container">
            <input type="password" id="password" name="password" placeholder="Contraseña" autocomplete="current-password">
            <button type="button" class="toggle-password" onclick="togglePassword('password')">
              <i class="fas fa-eye" id="password-icon"></i>
            </button>
          </div>
          <div style="height: 18px;"></div>
          <button type="submit" style="margin-top: 0;">Entrar</button>
        </form>
        
        <!-- Botón de Google -->
        <div style="margin: 20px 0; text-align: center;">
          <span style="color: #999; font-size: 0.9rem;">o</span>
        </div>
        <button type="button" id="google-login-btn" class="btn-google" style="width: 100%; padding: 12px; background: #fff; border: 1px solid #ddd; border-radius: 6px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 1rem; font-weight: 500; color: #333; transition: background 0.2s;">
          <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google logo" style="width: 20px; height: 20px;">
          Iniciar sesión con Google
        </button>
        <p>¿No tienes cuenta? <a href="registro.html">Regístrate</a></p>
        <p><a href="forgot-password.html" style="color: #00bfae; font-size: 0.9rem;">¿Olvidaste tu contraseña?</a></p>
      </div>
    </main>
  </div>

  <!-- FOOTER PREMIUM -->
  <div id="footer-container"></div>

  <!-- Inicialización centralizada -->
  <script type="module" src="main.js"></script>
<script type="module" src="navbar-logic.js"></script>
<script src="load-components.js" defer></script>

</body>
</html>
